# Alembic 설정 (사양서 §12)

[alembic]
script_location = alembic
prepend_sys_path = .

# DATABASE_URL 은 env.py 에서 환경변수로 주입
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# ruff 포맷터 자동 적용
# hooks = ruff
# ruff.type = fix
# ruff.options = --select I

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
