user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── 서버 정보 숨김 ──────────────────────────────────────────────────────
    server_tokens off;

    # ── 성능 ────────────────────────────────────────────────────────────────
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # ── Gzip 압축 ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/plain
        text/css
        text/javascript
        image/svg+xml;

    # ── 로그 ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    # ── Rate Limiting (nginx 레벨 — 1차 방어선) ─────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;
    limit_req_status 429;

    # ── 클라이언트 제한 ──────────────────────────────────────────────────────
    client_max_body_size    10m;
    client_body_timeout     30s;
    client_header_timeout   15s;
    send_timeout            30s;

    # ── 보안 헤더 (전역) ────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"                       always;
    add_header X-Frame-Options         "DENY"                          always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy
        "geolocation=(), microphone=(), camera=()" always;

    # ── Upstream ────────────────────────────────────────────────────────────
    upstream backend_app {
        server backend:8000;
        keepalive 32;
    }
    upstream frontend_app {
        server frontend:3000;
        keepalive 16;
    }

    # ── HTTP → HTTPS 리다이렉트 + ACME challenge ─────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS 메인 서버 ──────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name ${DOMAIN_NAME};     # 환경변수 치환 필요 (envsubst)

        # ── TLS 설정 ──────────────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/${DOMAIN_NAME}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN_NAME}/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/${DOMAIN_NAME}/chain.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:20m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP Stapling
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # HSTS (2년, includeSubDomains, preload)
        add_header Strict-Transport-Security
            "max-age=63072000; includeSubDomains; preload" always;

        # CSP
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';"
            always;

        # ── Frontend ──────────────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # SPA: index.html fallback
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }

        # ── API ───────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://backend_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # ── Login 엔드포인트 — 더 엄격한 Rate Limit ──────────────────────
        location /api/v1/auth/login {
            limit_req zone=login burst=5 nodelay;

            proxy_pass         http://backend_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 15s;
        }

        # ── Health Check (내부 모니터링용) ───────────────────────────────
        location /api/v1/health {
            proxy_pass http://backend_app;
            access_log off;
        }
    }
}
