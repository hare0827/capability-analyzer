version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: pca_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pca}
      POSTGRES_USER: ${POSTGRES_USER:-pca_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pca_db_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pca_user} -d ${POSTGRES_DB:-pca}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pca_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - pca_redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: pca_backend
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pca_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pca}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - pca_uploads:/app/uploads
    expose:
      - "8000"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: pca_frontend
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend

  clamav:
    image: clamav/clamav:1.3
    container_name: pca_clamav
    restart: unless-stopped
    volumes:
      - pca_clamav_db:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s  # DB 업데이트 대기

  nginx:
    image: nginx:1.25-alpine
    container_name: pca_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

volumes:
  pca_db_data:
  pca_redis_data:
  pca_uploads:
  pca_clamav_db:
