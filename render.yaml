services:
  - type: web
    name: pca-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    port: 8000
    healthCheckPath: /api/v1/health
    # free tier 512MB 제한 — worker 1개로 제한
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --timeout-graceful-shutdown 30 --access-log
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: BACKEND_CORS_ORIGINS
        sync: false
