services:
  - type: web
    name: pca-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    port: 8000
    healthCheckPath: /api/v1/health
    # Docker 배포 시 startCommand는 무시됨 — Dockerfile CMD의 WEB_CONCURRENCY로 제어
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: BACKEND_CORS_ORIGINS
        sync: false
